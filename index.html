<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow Pro | Dashboard Acadêmico</title>
    <link rel="shortcut icon" href="study.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard">
        <header>
            <div class="header-info">
                <h1>EduFlow <span>PRO</span></h1>
                <p id="dateDisplay"></p>
            </div>
            <div class="progress-container">
                <div class="progress-stats">
                    <span id="percentTxt">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progressBar"></div>
                </div>
            </div>
        </header>

        <section class="controls-section">
            <div class="input-row">
                <input type="text" id="subjectInput" placeholder="Matéria (ex: Algoritmos)">
                <select id="colorSelect">
                    <option value="border-blue">🔵 Azul</option>
                    <option value="border-purple">🟣 Roxo</option>
                    <option value="border-orange">🟠 Laranja</option>
                    <option value="border-green">🟢 Verde</option>
                </select>
            </div>
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="O que você precisa fazer?">
                <button id="addBtn">Adicionar</button>
            </div>

            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
            </div>
        </section>

        <main>
            <ul id="taskList"></ul>
        </main>

        <footer>
            <button id="clearBtn">Limpar tarefas concluídas</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
